                  - heading "The standard treatment" [level=3] [ref=e594]
                - paragraph [ref=e595]: Six rounds of chemotherapy with two HER2-targeted antibodies, then surgery to remove the tumor (keeping the breast), then radiation and a year of antibody-only treatment, plus a daily pill to block estrogen for at least five years.
                - generic [ref=e596]:
                  - paragraph [ref=e597]: What life looks like
                  - text: Most intense for the first 4–5 months. Hair loss is expected during chemo. Surgery is one day. Radiation is short daily visits for three weeks. The antibody year and the estrogen pill are well tolerated. Highest chance of cure.
                - button "I'd like this option" [ref=e598]:
                  - img [ref=e599]
                  - text: I'd like this option
