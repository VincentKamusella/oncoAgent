                - generic [ref=e603]:
                  - generic [ref=e604]: B
                  - heading "A gentler path" [level=3] [ref=e606]
                - paragraph [ref=e607]: A milder weekly chemotherapy with one HER2 antibody for three months, then surgery, then up to a year of an antibody-only treatment that's adjusted to how well the chemo worked.
                - generic [ref=e608]:
                  - paragraph [ref=e609]: What life looks like
                  - text: Less intense weekly visits, much less likely to cause numb fingers/toes long-term. Slightly lower chance of complete tumor disappearance before surgery, but the year of antibody-only treatment afterwards catches up much of that gap.
                - button "I'd like this option" [ref=e610]:
                  - img [ref=e611]
                  - text: I'd like this option
