                  - heading "A clinical trial" [level=3] [ref=e618]
                - paragraph [ref=e619]: The standard treatment plus an additional daily pill that targets a specific change in your tumor (PIK3CA), to see if it improves the chance of complete tumor disappearance.
                - generic [ref=e620]:
